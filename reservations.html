<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore BrewVibes Cafe & Roastery. Check out our menu, book a table, or learn about our story.">
    <title>Reservations | BrewVibes Cafe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html" style="color: var(--primary-color);">☕ BrewVibes</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link active" href="reservations.html">Reservations</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
                    <li class="nav-item"><a class="nav-link" href="team.html">Team</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
                <div class="d-flex align-items-center ms-3">
                    <button id="theme-toggle" class="btn border-0 fs-4 p-0" aria-label="Toggle Dark Mode" style="background:transparent;">☀️</button>
                </div>
            </div>
        </div>
    </nav>
    <div class="container" style="margin-top:30px; min-height:75vh;">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card p-5">
                    <h2 class="text-center mb-4">Book a Table</h2>
                    <form id="reservation-form" novalidate>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Full Name</label>
                            <input type="text" class="form-control" id="res-name" placeholder="Your name">
                            <div class="error-msg">Please enter your name.</div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Date</label>
                                <input type="date" class="form-control" id="res-date">
                                <div class="error-msg">Please select a date.</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Time</label>
                                <input type="time" class="form-control" id="res-time">
                                <div class="error-msg">Please select a time.</div>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Number of Guests</label>
                            <input type="number" class="form-control" id="res-guests" min="1" max="20" placeholder="e.g. 2">
                            <div class="error-msg">Please enter number of guests (1-20).</div>
                        </div>
                        <button type="submit" class="btn w-100 btn-lg text-white fw-bold"
                            style="background-color:var(--primary-color);">Confirm Reservation</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <footer class="footer text-center">
        <div class="container">
            <p class="mb-0">&copy; 2026 BrewVibes Cafe &amp; Roastery. Crafted with passion.</p>
        </div>
    </footer>
    <button id="scrollTopBtn" aria-label="Scroll to top">&#8679;</button>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore BrewVibes Cafe & Roastery. Check out our menu, book a table, or learn about our story.">
    <title>Menu | BrewVibes Cafe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html" style="color: var(--primary-color);">☕ BrewVibes</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="menu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="reservations.html">Reservations</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
                    <li class="nav-item"><a class="nav-link" href="team.html">Team</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
                <div class="d-flex align-items-center ms-3">
                    <button id="theme-toggle" class="btn border-0 fs-4 p-0" aria-label="Toggle Dark Mode" style="background:transparent;">☀️</button>
                </div>
            </div>
        </div>
    </nav>
    <div class="container" style="margin-top:30px; min-height:75vh;">
        <h2 class="text-center mb-4">Our Menu</h2>
        <div class="text-center mb-5">
            <button class="btn btn-outline-secondary filter-btn active me-1" data-filter="all">All</button>
            <button class="btn btn-outline-secondary filter-btn me-1" data-filter="coffee">Coffee</button>
            <button class="btn btn-outline-secondary filter-btn me-1" data-filter="pastry">Pastries</button>
            <button class="btn btn-outline-secondary filter-btn" data-filter="mains">Mains</button>
        </div>
        <div class="row">
            <div class="col-md-4 mb-4"><div class="card menu-item" data-category="coffee">
                <img src="images/latte.jpg" class="menu-img" alt="Latte">
                <div class="card-body text-center"><h4 class="card-title">Classic Latte</h4>
                <p class="card-text fw-bold" style="color:var(--primary-color);">$4.50</p></div>
            </div></div>
            <div class="col-md-4 mb-4"><div class="card menu-item" data-category="coffee">
                <img src="images/espresso.jpg" class="menu-img" alt="Espresso">
                <div class="card-body text-center"><h4 class="card-title">Double Espresso</h4>
                <p class="card-text fw-bold" style="color:var(--primary-color);">$3.00</p></div>
            </div></div>
            <div class="col-md-4 mb-4"><div class="card menu-item" data-category="pastry">
                <img src="images/croissant.jpg" class="menu-img" alt="Croissant">
                <div class="card-body text-center"><h4 class="card-title">Butter Croissant</h4>
                <p class="card-text fw-bold" style="color:var(--primary-color);">$3.75</p></div>
            </div></div>
            <div class="col-md-4 mb-4"><div class="card menu-item" data-category="mains">
                <img src="images/avocado_toast.jpg" class="menu-img" alt="Avocado Toast">
                <div class="card-body text-center"><h4 class="card-title">Avocado Toast</h4>
                <p class="card-text fw-bold" style="color:var(--primary-color);">$9.50</p></div>
            </div></div>
        </div>
    </div>
    <footer class="footer text-center">
        <div class="container">
            <p class="mb-0">&copy; 2026 BrewVibes Cafe &amp; Roastery. Crafted with passion.</p>
        </div>
    </footer>
    <button id="scrollTopBtn" aria-label="Scroll to top">&#8679;</button>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
